services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-backup:
    image: postgres:18
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./nfs/wm/backups:/backups
    entrypoint: >
      sh -c "
        while true; do
          FILENAME=/backups/$$(date +%Y-%m-%d_%H-%M-%S).dump
          pg_dump -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -F c -f $$FILENAME
          echo \"Backup saved: $$FILENAME\"
          find /backups -name '*.dump' -mtime +7 -delete
          sleep 86400
        done
      "

volumes:
  postgres_data:
