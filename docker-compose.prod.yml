services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3268:3000"
    env_file:
      - .env.prod
    depends_on:
      - postgres

  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "54523:5432"

  postgres-backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env.prod
    environment:
      POSTGRES_HOST: postgres
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ./nfs/wm/backups:/backups

volumes:
  postgres_data:
