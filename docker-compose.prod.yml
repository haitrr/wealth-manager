services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3268:3000"
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "54523:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env.prod
    environment:
      POSTGRES_HOST: postgres
      SCHEDULE: "@hourly"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - postgres-backups:/backups

volumes:
  postgres_data:
  postgres-backups:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=ugnas.lc,rw,noatime,nolock,intr,tcp,actimeo=1800,nfsvers=3"
      device: ":/volume2/wm/backups"
