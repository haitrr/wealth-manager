<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="bar-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="bar-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="bar-c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Bar 1 (short, left) -->
  <rect x="72" y="310" width="96" height="142" rx="14" fill="url(#bar-a)" opacity="0.65"/>
  <!-- Bar 2 (medium, center) -->
  <rect x="208" y="210" width="96" height="242" rx="14" fill="url(#bar-b)" opacity="0.82"/>
  <!-- Bar 3 (tall, right) -->
  <rect x="344" y="108" width="96" height="344" rx="14" fill="url(#bar-c)"/>

  <!-- Trend line connecting tops with glow -->
  <polyline
    points="120,305 256,203 392,102"
    stroke="#6ee7b7"
    stroke-width="14"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.35"
    filter="url(#glow)"
  />
  <polyline
    points="120,305 256,203 392,102"
    stroke="#a7f3d0"
    stroke-width="7"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Arrow at top-right -->
  <circle cx="392" cy="102" r="16" fill="#a7f3d0"/>
</svg>
