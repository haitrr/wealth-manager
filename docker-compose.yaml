# Use postgres/example user/password credentials
version: '3.9'

services:

  postgres:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "54523:5432"
  app:
    build: .
    profiles:
      - prod
    restart: always
    depends_on:
      - postgres
    ports:
      - "3412:8000"
